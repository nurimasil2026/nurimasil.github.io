<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #F5C800;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px 48px;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .poster-wrap {
    width: 100%;
    max-width: 480px;
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 12px 48px rgba(0,0,0,0.25);
  }

  .poster-wrap img {
    width: 100%;
    height: auto;
    display: block;
  }

  .btn-group {
    margin-top: 28px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 480px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 18px 24px;
    border-radius: 100px;
    font-family: 'Noto Sans KR', sans-serif;
    font-weight: 900;
    font-size: 1.05rem;
    text-decoration: none;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.02em;
  }

  .btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.22);
  }
  .btn:active { transform: translateY(0); }

  .btn-detail {
    background: #1A1200;
    color: #F5C800;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  }

  .btn-contact {
    background: #FFFDF0;
    color: #1A1200;
    border: 3px solid #1A1200;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }
</style>
